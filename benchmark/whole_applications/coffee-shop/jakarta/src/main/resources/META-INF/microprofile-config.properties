# bootstrap (fallback so dev works even if env var is missing)
mp.messaging.connector.liberty-kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}

# --- orders outgoing: Emitter -> barista-commands topic ---
mp.messaging.outgoing.barista-out.connector=liberty-kafka
mp.messaging.outgoing.barista-out.topic=barista-commands
mp.messaging.outgoing.barista-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.barista-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- orders outgoing: Emitter -> kitchen-commands topic ---
mp.messaging.outgoing.kitchen-out.connector=liberty-kafka
mp.messaging.outgoing.kitchen-out.topic=kitchen-commands
mp.messaging.outgoing.kitchen-out.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.kitchen-out.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- barista incoming: from barista-commands topic ---
mp.messaging.incoming.barista.connector=liberty-kafka
mp.messaging.incoming.barista.topic=barista-commands
mp.messaging.incoming.barista.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.barista.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.barista.auto.offset.reset=latest
mp.messaging.incoming.barista.group.id=barista-service-dev

# --- barista outgoing: -> order-updates topic ---
mp.messaging.outgoing.barista-order-updates.connector=liberty-kafka
mp.messaging.outgoing.barista-order-updates.topic=order-updates
mp.messaging.outgoing.barista-order-updates.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.barista-order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- kitchen incoming: from kitchen-commands topic ---
mp.messaging.incoming.kitchen.connector=liberty-kafka
mp.messaging.incoming.kitchen.topic=kitchen-commands
mp.messaging.incoming.kitchen.group.id=kitchen-service
mp.messaging.incoming.kitchen.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.kitchen.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer

# --- kitchen outgoing: -> order-updates topic ---
mp.messaging.outgoing.kitchen-order-updates.connector=liberty-kafka
mp.messaging.outgoing.kitchen-order-updates.topic=order-updates
mp.messaging.outgoing.kitchen-order-updates.key.serializer=org.apache.kafka.common.serialization.StringSerializer
mp.messaging.outgoing.kitchen-order-updates.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# --- orders incoming: from order-updates topic ---
mp.messaging.incoming.order-updates.connector=liberty-kafka
mp.messaging.incoming.order-updates.topic=order-updates
mp.messaging.incoming.order-updates.key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-updates.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.order-updates.group.id=orders-service
mp.messaging.incoming.order-updates.auto.offset.reset=latest
mp.messaging.incoming.order-updates.failure-strategy=ignore
