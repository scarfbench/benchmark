spring.application.name=coffeeshop
server.port=8080

# --- DataSource (H2 in-memory for standalone/test) ---
spring.datasource.url=jdbc:h2:mem:coffeeshop;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- JPA/Hibernate ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Kafka ---
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.listener.missing-topics-fatal=false
spring.kafka.producer.properties.max.block.ms=500

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all

# Consumer (group-id per listener via @KafkaListener; set a sensible default)
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.listener.ack-mode=record

# --- Web / Thymeleaf ---
streamUrl=http://localhost:8080/api/dashboard/stream
storeId=ATLANTA

# --- Logging ---
logging.level.com.coffeeshop=DEBUG
logging.level.org.springframework.kafka=INFO
