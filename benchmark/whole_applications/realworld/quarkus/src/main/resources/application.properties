quarkus.rest.path=/api

# Database configuration
# Default to in-memory H2 (used inside the benchmark container).
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:realworld;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.database.generation=drop-and-create

%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:realworld-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE

# Override for production with PostgreSQL.
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.datasource.devservices.image-name=postgres:17

# JWT settings
smallrye.jwt.sign.key.location=classpath:privateKey.pem
mp.jwt.verify.publickey.location=classpath:publicKey.pem
mp.jwt.verify.issuer=users-service
