spring.main.banner-mode=off
logging.level.org.springframework=warn
logging.level.com.coffeeshop=debug
server.port=0
streamUrl=http://localhost:8080/api/dashboard/stream
storeId=ATLANTA

# The DataJpaTest uses Testcontainers overrides; keep defaults minimal here.
# spring.jpa.show-sql=false

# Disable JPA/DataSource auto-config in unit tests (integration tests override per-class)
spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration
