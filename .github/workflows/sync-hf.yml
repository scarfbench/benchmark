name: Sync to HuggingFace

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Sync to HuggingFace dataset repo
        env:
          HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          # Copy README_HF.md into benchmark/ as README.md for HF
          cp README_HF.md benchmark/README.md

          python3 << 'PYEOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="benchmark",
              repo_id="ibm-research/ScarfBench",
              repo_type="dataset",
              commit_message=f"Sync from GitHub {os.environ.get('GITHUB_SHA', '')[:7]}",
              delete_patterns=["*"],  # mirror: remove files deleted on GitHub
          )
          print("Sync complete.")
          PYEOF
